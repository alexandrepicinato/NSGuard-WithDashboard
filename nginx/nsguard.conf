# NS Guard Ubuntu 24.04
# 80 = redirect publico | 87 = admin/API | 89 = banner

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    root __APP_DIR__/public;
    index index.php;

    access_log /var/log/nginx/nsguard-redirect.access.log;
    error_log  /var/log/nginx/nsguard-redirect.error.log;

    location ^~ /admin { return 404; }
    location = /api.php { return 404; }

    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    location = /index.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:__PHP_FPM_SOCK__;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location / {
        rewrite ^ /index.php last;
    }

    location ~ /(?:app|config|database|scripts|systemd|nginx|data)/ { deny all; }
    location ~ /\. { deny all; }
}

server {
    listen 87;
    listen [::]:87;
    server_name _;
    root __APP_DIR__/public;
    index index.php;

    access_log /var/log/nginx/nsguard-admin.access.log;
    error_log  /var/log/nginx/nsguard-admin.error.log;

    location = / { return 302 /admin/; }
    location = /admin { return 301 /admin/; }

    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    location = /admin/index.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:__PHP_FPM_SOCK__;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location /admin/ {
        try_files $uri $uri/ /admin/index.php?$query_string;
    }

    location = /api.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:__PHP_FPM_SOCK__;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location / { return 302 /admin/; }
    location ~ /(?:app|config|database|scripts|systemd|nginx|data)/ { deny all; }
    location ~ /\. { deny all; }
}

server {
    listen 89;
    listen [::]:89;
    server_name _;
    root __APP_DIR__/public;
    index index.html;

    access_log /var/log/nginx/nsguard-banner.access.log;
    error_log  /var/log/nginx/nsguard-banner.error.log;

    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    location / {
        try_files /banner/index.html =404;
    }

    location ~ \.php$ { return 404; }
    location ~ /(?:app|config|database|scripts|systemd|nginx|data)/ { deny all; }
    location ~ /\. { deny all; }
}
